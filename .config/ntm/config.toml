projects_base = "/c/WORK"

[agent_mail]
enabled = true
url = "http://127.0.0.1:8765/api/"
auto_register = true

[agents]
claude = "env -u CLAUDECODE -u CLAUDE_CODE_SESSION -u CLAUDE_CODE_ENTRY_POINT NODE_OPTIONS=\"--max-old-space-size=32768\" claude --dangerously-skip-permissions --strict-mcp-config{{if .Model}} --model {{shellQuote .Model}}{{end}}{{if .SystemPromptFile}} --system-prompt-file {{shellQuote .SystemPromptFile}}{{end}}"

[models]
default_claude = "claude-opus-4-6"

[models.claude]
opus = "claude-opus-4-6"
sonnet = "claude-sonnet-4-6"
fast = "claude-sonnet-4-6"
haiku = "claude-haiku-4-5-20251001"
